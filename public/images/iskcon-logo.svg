  <circle cx="100" cy="100" r="85" stroke="#d9700c" stroke-width="1.5" fill="none"/>
  <!-- Inner lotus/tilak design -->
  <path d="M100 30 C100 30 130 60 130 90 C130 120 115 140 100 160 C85 140 70 120 70 90 C70 60 100 30 100 30Z" fill="#d9700c" opacity="0.15"/>
  <path d="M100 40 C100 40 125 65 125 90 C125 115 112 132 100 148 C88 132 75 115 75 90 C75 65 100 40 100 40Z" stroke="#b4540c" stroke-width="2" fill="none"/>
